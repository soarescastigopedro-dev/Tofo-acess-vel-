<!-- Botão do Chat -->
<div id="chat-botao" style="position:fixed;bottom:20px;right:20px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9999;">
  💬
</div>

<!-- Caixa do Chat -->
<div id="chat-caixa" style="display:none;position:fixed;bottom:90px;right:20px;width:320px;height:400px;background:white;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:9999;flex-direction:column;">
  <div style="background:#25D366;color:white;padding:10px;border-radius:10px 10px 0 0;font-weight:bold;">
    Atendimento IA
  </div>
  <div id="chat-mensagens" style="flex:1;padding:10px;overflow-y:auto;font-size:14px;"></div>
  <div style="display:flex;border-top:1px solid #ddd;">
    <input id="chat-input" type="text" placeholder="Digite aqui..." style="flex:1;border:none;padding:10px;outline:none;">
    <button onclick="enviarMensagem()" style="border:none;background:#25D366;color:white;padding:0 15px;cursor:pointer;">Enviar</button>
  </div>
</div>

<script>
const botao = document.getElementById('chat-botao');
const caixa = document.getElementById('chat-caixa');
const mensagens = document.getElementById('chat-mensagens');
const input = document.getElementById('chat-input');

// Abre e fecha o chat
botao.onclick = () => {
  caixa.style.display = caixa.style.display === 'flex' ? 'none' : 'flex';
};

// Função para enviar mensagem
async function enviarMensagem() {
  const pergunta = input.value.trim();
  if (!pergunta) return;
  
  mensagens.innerHTML += `<div style="margin:5px 0;text-align:right;"><b>Você:</b> ${pergunta}</div>`;
  input.value = '';
  
  try {
    const resposta = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer COLE_SUA_CHAVE_AQUI",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.1-70b-versatile",
        messages: [{role: "user", content: pergunta}]
      })
    });
    const dados = await resposta.json();
    const texto = dados.choices[0].message.content;
    mensagens.innerHTML += `<div style="margin:5px 0;"><b>IA:</b> ${texto}</div>`;
    mensagens.scrollTop = mensagens.scrollHeight;
  } catch (e) {
    mensagens.innerHTML += `<div style="margin:5px 0;color:red;">Erro ao conectar. Verifica a chave da API.</div>`;
  }
}

// Enviar com Enter
input.addEventListener('keypress', e => {
  if (e.key === 'Enter') enviarMensagem();
});
</script>
